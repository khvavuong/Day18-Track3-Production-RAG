version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: lab18-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  qdrant_storage:
